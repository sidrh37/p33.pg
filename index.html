<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 업데이트 캘린더</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0c0d10;
  --surface: #13141a;
  --surface2: #1c1d25;
  --surface3: #252633;
  --border: #2a2b3a;
  --text: #dde1f0;
  --text-muted: #5c5f78;
  --text-dim: #8b8fa8;
  --accent: #5b6af0;
  --accent-soft: rgba(91,106,240,0.12);
  --red: #f05b7a;
  --green: #3dd68c;
  --yellow: #f0b429;
  --cyan: #38c4d4;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ─────────────────────────── */
.topbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.tb-left { display:flex; align-items:center; gap:12px; }
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--accent);
  letter-spacing: .1em; white-space:nowrap;
}
.nav-group { display:flex; align-items:center; gap:3px; }
.nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); width: 26px; height: 26px; border-radius: 6px;
  cursor: pointer; font-size: 13px; display: flex; align-items: center;
  justify-content: center; transition: all .12s;
}
.nav-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--accent); }
.today-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); padding: 0 9px; height: 26px;
  border-radius: 6px; cursor: pointer; font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif; transition: all .12s;
}
.today-btn:hover { color:var(--text); border-color:var(--accent); }
.cur-label { font-size: 14px; font-weight: 500; min-width: 130px; text-align: center; }

.tb-right { display:flex; align-items:center; gap:7px; }
.view-toggle { display:flex; background:var(--surface2); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.view-btn { padding:4px 11px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; background:transparent; border:none; color:var(--text-muted); transition:all .12s; }
.view-btn.active { background:var(--accent); color:#fff; }
.add-btn {
  background: var(--accent); border: none; color: #fff;
  padding: 5px 13px; border-radius: 6px; font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background .12s;
}
.add-btn:hover { background: #4a59d4; }

/* ── LAYOUT ─────────────────────────── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ────────────────────────── */
.sidebar {
  width: 200px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sb-scroll { flex:1; overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:16px; }

/* mini calendar */
.mini-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.mini-title { font-size:10px; color:var(--text-dim); font-family:'DM Mono',monospace; }
.mini-nb { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; padding:2px 3px; }
.mini-nb:hover { color:var(--text); }
.mini-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
.mini-dow { font-size:8px; color:var(--text-muted); text-align:center; padding:2px 0; font-family:'DM Mono',monospace; }
.mini-day {
  font-size:9px; text-align:center; padding:3px 1px;
  border-radius:3px; cursor:pointer; color:var(--text-muted);
  transition:all .1s; font-family:'DM Mono',monospace; line-height:1.5;
}
.mini-day:hover { background:var(--surface3); color:var(--text); }
.mini-day.today { background:var(--accent); color:#fff !important; }
.mini-day.other { opacity:.25; }
.mini-day.has-ev::after { content:''; display:block; width:3px; height:3px; background:var(--red); border-radius:50%; margin:0 auto; }

/* section label */
.sec-lbl { font-size:9px; font-family:'DM Mono',monospace; color:var(--text-muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }

/* game list */
.game-list { display:flex; flex-direction:column; gap:2px; }
.game-item {
  display:flex; align-items:center; gap:6px;
  padding:5px 7px; border-radius:5px; cursor:pointer;
  transition:background .1s; font-size:11px; color:var(--text-dim);
  border:1px solid transparent;
}
.game-item:hover { background:var(--surface2); }
.game-item.active { background:var(--surface2); color:var(--text); border-color:var(--border); }
.game-item.g-all.active { color:var(--accent); border-color:var(--accent-soft); }
.game-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.game-count { margin-left:auto; font-size:9px; font-family:'DM Mono',monospace; color:var(--text-muted); background:var(--surface3); border-radius:3px; padding:1px 4px; }
.game-del { margin-left:2px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; opacity:0; transition:opacity .1s; padding:0 1px; }
.game-item:hover .game-del { opacity:1; }
.game-del:hover { color:var(--red); }

.add-game-row { display:flex; align-items:center; gap:4px; margin-top:5px; }
.add-game-input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; color:var(--text); padding:4px 7px;
  font-size:10px; font-family:'Noto Sans KR',sans-serif; outline:none;
}
.add-game-input:focus { border-color:var(--accent); }
.add-game-btn { background:var(--accent); border:none; color:#fff; width:20px; height:20px; border-radius:4px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }

/* event type badges */
.type-badge {
  font-size:8px; padding:1px 5px; border-radius:3px;
  font-family:'DM Mono',monospace; letter-spacing:.03em; white-space:nowrap;
}
.type-major    { background:rgba(240,91,122,.18); color:#f08fa0; }
.type-minor    { background:rgba(91,106,240,.18); color:#9aa3f5; }
.type-hotfix   { background:rgba(240,180,41,.18); color:#f0cc80; }
.type-content  { background:rgba(61,214,140,.18); color:#80e0b0; }
.type-season   { background:rgba(56,196,212,.18); color:#80d8e0; }
.type-event    { background:rgba(180,91,240,.18); color:#c880f0; }

/* multi-day span bar */
.ev-span {
  display:flex; align-items:center; gap:3px;
  margin-bottom:2px; padding:1px 5px; border-radius:3px;
  cursor:pointer; line-height:1.5; overflow:hidden;
  font-size:10px; white-space:nowrap;
}
.ev-span:hover { opacity:.8; }
.ev-span.span-start { border-radius:3px 0 0 3px; padding-right:2px; }
.ev-span.span-mid   { border-radius:0; padding-left:2px; padding-right:2px; }
.ev-span.span-end   { border-radius:0 3px 3px 0; padding-left:2px; }
.ev-span.span-start.span-end { border-radius:3px; }

/* upcoming */
.upcoming-list { display:flex; flex-direction:column; gap:4px; }
.upc-item { padding:6px 8px; background:var(--surface2); border-radius:5px; border-left:2px solid; cursor:pointer; transition:background .1s; }
.upc-item:hover { background:var(--surface3); }
.upc-date { font-size:9px; color:var(--text-muted); font-family:'DM Mono',monospace; margin-bottom:1px; }
.upc-title { font-size:11px; color:var(--text); }
.upc-game { font-size:9px; margin-top:1px; }

/* ── CALENDAR AREA ───────────────────── */
.cal-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.dow-row { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); flex-shrink:0; }
.dow-cell { text-align:center; padding:8px 0; font-size:9px; color:var(--text-muted); font-family:'DM Mono',monospace; letter-spacing:.05em; }
.dow-cell:first-child { color:var(--red); }

/* Month */
.month-view { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.month-grid { display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(6,1fr); flex:1; overflow:hidden; }
.day-cell {
  border-right:1px solid var(--border); border-bottom:1px solid var(--border);
  padding:4px; overflow:hidden; cursor:pointer; position:relative;
  transition:background .1s; min-height:0;
}
.day-cell:hover { background:var(--surface); }
.day-cell.other-month .day-num { opacity:.2; }
.day-cell.today { background:rgba(91,106,240,.07); }
.day-cell.today .day-num { background:var(--accent); color:#fff; border-radius:50%; width:19px; height:19px; display:flex; align-items:center; justify-content:center; }
.day-cell.sunday .day-num { color:var(--red); }
.day-num { font-size:10px; font-family:'DM Mono',monospace; color:var(--text); margin-bottom:2px; width:19px; height:19px; display:flex; align-items:center; justify-content:center; }
.ev-row { display:flex; align-items:center; gap:3px; margin-bottom:2px; cursor:pointer; padding:1px 3px; border-radius:3px; transition:background .1s; }
.ev-row:hover { background:var(--surface3); }
.ev-game-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.ev-name { font-size:10px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex:1; color:var(--text-dim); }
.more-lbl { font-size:9px; color:var(--text-muted); padding:0 3px; }

/* Week */
.week-view { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.week-header { display:grid; grid-template-columns:40px repeat(7,1fr); border-bottom:1px solid var(--border); flex-shrink:0; }
.wh-empty {}
.wh-day { text-align:center; padding:7px 4px; border-left:1px solid var(--border); }
.wh-name { font-size:9px; color:var(--text-muted); font-family:'DM Mono',monospace; }
.wh-num { font-size:15px; font-family:'DM Mono',monospace; color:var(--text); line-height:1.2; }
.wh-day.today .wh-num { color:var(--accent); }
.wh-day.sunday .wh-name { color:var(--red); }
.week-body { flex:1; overflow-y:auto; display:grid; grid-template-columns:40px repeat(7,1fr); }
.time-gutter { border-right:1px solid var(--border); position:sticky; left:0; background:var(--bg); z-index:2; }
.time-lbl { height:44px; display:flex; align-items:flex-start; justify-content:flex-end; padding:3px 6px 0 0; font-size:9px; font-family:'DM Mono',monospace; color:var(--text-muted); }
.week-col { border-left:1px solid var(--border); position:relative; }
.hour-slot { height:44px; border-bottom:1px solid rgba(42,43,58,.5); cursor:pointer; }
.hour-slot:hover { background:var(--surface); }
.week-ev { position:absolute; left:2px; right:2px; border-radius:4px; padding:2px 5px; font-size:10px; overflow:hidden; cursor:pointer; z-index:1; line-height:1.3; border-left:2px solid; }
.week-ev:hover { opacity:.8; }
.now-line { position:absolute; left:0; right:0; height:2px; background:var(--red); z-index:3; }
.now-line::before { content:''; position:absolute; left:-4px; top:-4px; width:9px; height:9px; border-radius:50%; background:var(--red); }

/* ── OVERLAY ─────────────────────────── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
.overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:22px; width:390px; max-width:95vw; animation:popIn .17s ease; }
@keyframes popIn { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-title { font-size:14px; font-weight:500; margin-bottom:16px; color:var(--text); }
.form-group { margin-bottom:11px; }
.form-label { font-size:9px; color:var(--text-muted); display:block; margin-bottom:3px; font-family:'DM Mono',monospace; letter-spacing:.06em; text-transform:uppercase; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text); padding:7px 10px;
  font-size:12px; font-family:'Noto Sans KR',sans-serif; outline:none;
  transition:border-color .12s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--accent); }
.form-select option { background:var(--surface2); }
.form-textarea { resize:vertical; min-height:54px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; }

/* update type selector */
.type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.type-opt {
  padding:5px 0; border-radius:5px; cursor:pointer; text-align:center;
  border:1px solid var(--border); background:var(--surface2);
  font-size:10px; color:var(--text-dim); transition:all .12s;
  font-family:'DM Mono',monospace;
}
.type-opt:hover { border-color:var(--text-muted); color:var(--text); }
.type-opt.selected { border-color:currentColor; }
.type-opt[data-type="major"]   { color:#f08fa0; }
.type-opt[data-type="minor"]   { color:#9aa3f5; }
.type-opt[data-type="hotfix"]  { color:#f0cc80; }
.type-opt[data-type="content"] { color:#80e0b0; }
.type-opt[data-type="season"]  { color:#80d8e0; }
.type-opt[data-type="event"]   { color:#c880f0; }
.type-opt.selected { background:rgba(255,255,255,.06); }

/* tags */
.tag-row { display:flex; gap:4px; }
.tag-row .form-input { flex:1; }
.tag-add-btn { background:var(--surface3); border:1px solid var(--border); color:var(--text-dim); border-radius:6px; padding:0 10px; cursor:pointer; font-size:16px; transition:all .12s; }
.tag-add-btn:hover { border-color:var(--accent); color:var(--accent); }
.tags-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; min-height:16px; }
.tag-pill { font-size:10px; padding:1px 7px; border-radius:20px; background:var(--surface3); border:1px solid var(--border); color:var(--text-dim); display:flex; align-items:center; gap:3px; }
.tag-pill button { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; padding:0; line-height:1; }
.tag-pill button:hover { color:var(--red); }

.modal-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:16px; }
.btn-del { background:rgba(240,91,122,.1); border:1px solid rgba(240,91,122,.2); color:var(--red); padding:6px 12px; border-radius:6px; font-family:'Noto Sans KR',sans-serif; font-size:11px; cursor:pointer; margin-right:auto; }
.btn-cancel { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:6px 12px; border-radius:6px; font-family:'Noto Sans KR',sans-serif; font-size:11px; cursor:pointer; }
.btn-cancel:hover { color:var(--text); }
.btn-save { background:var(--accent); border:none; color:#fff; padding:6px 16px; border-radius:6px; font-family:'Noto Sans KR',sans-serif; font-size:11px; cursor:pointer; }
.btn-save:hover { background:#4a59d4; }

/* EVENT POPUP */
.ev-popup { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:14px; width:258px; z-index:200; box-shadow:0 10px 36px rgba(0,0,0,.6); display:none; animation:popIn .14s ease; }
.pp-bar { height:3px; border-radius:2px; margin-bottom:10px; }
.pp-title { font-size:13px; font-weight:500; margin-bottom:4px; }
.pp-meta { display:flex; align-items:center; gap:5px; margin-bottom:5px; flex-wrap:wrap; }
.pp-date { font-size:10px; color:var(--text-muted); font-family:'DM Mono',monospace; }
.pp-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:7px; }
.pp-tag { font-size:9px; padding:1px 6px; border-radius:10px; background:var(--surface3); color:var(--text-muted); }
.pp-desc { font-size:11px; color:var(--text-dim); margin-bottom:10px; white-space:pre-wrap; line-height:1.5; }
.pp-actions { display:flex; gap:5px; }
.pp-btn { font-size:11px; padding:4px 9px; border-radius:5px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); }
.pp-btn:hover { color:var(--text); }

/* TOAST */
.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:8px 15px; font-size:12px; z-index:300; display:none; animation:popIn .2s ease; white-space:nowrap; }

/* DB BADGE */
.db-badge { display:flex; align-items:center; gap:5px; font-size:11px; font-family:'DM Mono',monospace; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); white-space:nowrap; }
.db-badge.ok  { border-color:var(--green); color:var(--green); }
.db-badge.err { border-color:var(--red);   color:var(--red); }
.db-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* LOGIN SCREEN */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  z-index:999;
}
.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:40px 36px; width:320px;
  display:flex; flex-direction:column; align-items:center; gap:18px;
  animation:popIn .2s ease;
}
.login-logo { font-family:'DM Mono',monospace; font-size:20px; color:var(--accent); letter-spacing:.1em; }
.login-desc { font-size:12px; color:var(--text-muted); text-align:center; line-height:1.7; }
.google-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:#fff; color:#333; border:none;
  padding:11px 22px; border-radius:8px; cursor:pointer;
  font-size:13px; font-weight:500; font-family:'Noto Sans KR',sans-serif;
  transition:all .15s; width:100%;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.google-btn:hover { background:#f1f1f1; transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,.35); }
.login-err { font-size:11px; color:var(--red); font-family:'DM Mono',monospace; display:none; }

/* USER BADGE */
.user-badge {
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--text-dim);
  padding:3px 9px 3px 4px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2);
  cursor:pointer; transition:all .15s;
}
.user-badge:hover { border-color:var(--red); color:var(--red); }
.u-avatar {
  width:22px; height:22px; border-radius:50%; overflow:hidden;
  background:var(--accent); display:flex; align-items:center; justify-content:center;
  font-size:10px; color:#fff; font-weight:600; flex-shrink:0;
}
.u-avatar img { width:100%; height:100%; object-fit:cover; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-track { background:transparent; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">PATCH·CAL</div>
    <div class="login-desc">게임 업데이트 스케줄 캘린더<br>구글 계정으로 로그인하세요</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 로그인
    </button>
    <div class="login-err" id="loginErr">로그인 중 오류가 발생했습니다</div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="logo">PATCH·CAL</div>
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn">‹</button>
      <button class="today-btn" id="todayBtn">오늘</button>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="cur-label" id="curLabel"></div>
  </div>

    <div class="db-badge" id="dbBadge">

<script>
// ══════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════
const SB_URL = 'https://vhubkuqufbvncfjqxztc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZodWJrdXF1ZmJ2bmNmanF4enRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjYxNzQsImV4cCI6MjA4OTkwMjE3NH0.ZiAI9n52FymrA0NiQ0FvHqQ82ngG3L7jGP2fXAh_pU0';

let accessToken = null; // set after login

function sbHeaders() {
  return {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${accessToken || SB_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

async function sbGet(table, qs='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, { headers: sbHeaders() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(body)

  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
async function loginWithGoogle() {
  // OAuth redirect
  const redirectTo = encodeURIComponent(location.href.split('?')[0].split('#')[0]);
  location.href = `${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${redirectTo}`;
}

async function logout() {
  if (!confirm('로그아웃 하시겠어요?')) return;
  await fetch(`${SB_URL}/auth/v1/logout`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${accessToken}` }
  });
  accessToken = null;
  sessionStorage.removeItem('sb_access_token');
  sessionStorage.removeItem('sb_refresh_token');
  showLoginScreen();
}

function showLoginScreen() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('userBadge').style.display = 'none';
}
function hideLoginScreen(user) {
  document.getElementById('loginScreen').style.display = 'none';
  // show user badge
  const badge = document.getElementById('userBadge');
  const avatar = document.getElementById('userAvatar');
  const nameEl = document.getElementById('userName');
  badge.style.display = 'flex';
  const name = user.user_metadata?.full_name || user.email || '';
  const pic  = user.user_metadata?.avatar_url || '';
  nameEl.textContent = name.split(' ')[0]; // first name only
  if (pic) avatar.innerHTML = `<img src="${pic}" alt="">`;
  else avatar.textContent = name.charAt(0).toUpperCase();
}

async function refreshSession(refreshToken) {
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!r.ok) return null;
  return r.json();
}

async function initAuth() {
  // 1) Check URL hash for OAuth callback tokens
  const hash = location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const at = params.get('access_token');
    const rt = params.get('refresh_token');
    if (at) {
      accessToken = at;
      sessionStorage.setItem('sb_access_token', at);
      if (rt) sessionStorage.setItem('sb_refresh_token', rt);
      history.replaceState(null, '', location.pathname); // clean URL
    }
  }

  // 2) Try stored token
  if (!accessToken) {
    accessToken = sessionStorage.getItem('sb_access_token');
  }

  // 3) Validate token / get user
  if (accessToken) {
    try {
      const r = await fetch(`${SB_URL}/auth/v1/user`, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${accessToken}` }
      });
      if (r.ok) {
        const user = await r.json();
        hideLoginScreen(user);
        return true;
      }
      // token expired — try refresh
      const rt = sessionStorage.getItem('sb_refresh_token');
      if (rt) {
        const data = await refreshSession(rt);
        if (data?.access_token) {
          accessToken = data.access_token;
          sessionStorage.setItem('sb_access_token', data.access_token);
          if (data.refresh_token) sessionStorage.setItem('sb_refresh_token', data.refresh_token);
          const r2 = await fetch(`${SB_URL}/auth/v1/user`, {
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${accessToken}` }
          });
          if (r2.ok) { hideLoginScreen(await r2.json()); return true; }
        }
      }
    } catch(e) { console.warn('auth check failed', e); }
  }

  // 4) Not logged in
  accessToken = null;
  showLoginScreen();
  return false;
}

function setBadge(state) { // 'loading' | 'ok' | 'err'
  const b=document.getElementById('dbBadge'), l=document.getElementById('dbLabel');
  b.className='db-badge'+(state==='ok'?' ok':state==='err'?' err':'');
  l.textContent = state==='ok'?'Supabase 연결됨' : state==='err'?'연결 실패' : '연결 중...';
}

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const today = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth();
let curWeek  = weekStart(today);
let view     = 'month';
let filterGame = 'all';
let miniY = curYear, miniM = curMonth;

let events = [];
let games  = [];

let curTags = [];
let curType = 'major';
let popupId = null;

const MONTHS   = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS     = ['일','월','화','수','목','금','토'];
const PALETTE  = ['#f05b7a','#5b6af0','#f0a429','#3dd68c','#38c4d4','#b45bf0','#f07a5b','#5bf0c4'];
const TYPE_LABEL = { major:'MAJOR', minor:'MINOR', hotfix:'HOTFIX', content:'CONTENT', season:'SEASON', event:'EVENT' };

// ══════════════════════════════════════
// UTIL
// ══════════════════════════════════════
function weekStart(d) { const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()); dt.setHours(0,0,0,0); return dt; }
function fmtDate(d)   { return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n)        { return String(n).padStart(2,'0'); }
function fmtTime(t)   { if(!t)return''; const[h,m]=t.split(':').map(Number); return `${h<12?'오전':'오후'} ${h%12||12}:${p2(m)}`; }
function getGame(id)  { return games.find(g=>g.id===id)||null; }
function evColor(ev)  { const g=getGame(ev.gameId); return g?g.color:'#5b6af0'; }
function visEvs()     { return filterGame==='all'?events:events.filter(e=>e.gameId===filterGame); }
function showToast(msg,dur=2200){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',dur); }
function evOnDate(ev, ds) { return ds>=(ev.dateStart||'') && ds<=(ev.dateEnd||ev.dateStart||''); }
function daysBetween(s, e) { return Math.round((new Date(e)-new Date(s))/86400000); }

// DB row ↔ local object conversion
function rowToEv(r) {
  return { id:r.id, title:r.title, dateStart:r.date_start, dateEnd:r.date_end||r.date_start,
           time:r.time||null, version:r.version||null, gameId:r.game_id||null,
           type:r.type||'major', tags:r.tags||[], desc:r.description||'' };
}
function evToRow(ev) {
  return { id:ev.id, title:ev.title, date_start:ev.dateStart, date_end:ev.dateEnd,
           time:ev.time||null, version:ev.version||null, game_id:ev.gameId||null,
           type:ev.type, tags:ev.tags||[], description:ev.desc||'' };
}
function rowToGame(r) { return { id:r.id, name:r.name, color:r.color }; }
function gameToRow(g) { return { id:g.id, name:g.name, color:g.color }; }

// ══════════════════════════════════════
// SYNC
// ══════════════════════════════════════
async function syncAll() {
  try {
    const [evRows, gRows] = await Promise.all([
      sbGet('cal_events', 'order=date_start.asc'),
      sbGet('cal_games',  'order=name.asc'),
    ]);
    events = evRows.map(rowToEv);
    games  = gRows.map(rowToGame);
    // default games if DB empty
    if (!games.length) {
      const defaults = [
        { id:'g1', name:'로스트아크',       color:'#f05b7a' },
        { id:'g2', name:'리그 오브 레전드', color:'#5b8af0' },
        { id:'g3', name:'오버워치 2',       color:'#f0a429' },
      ];
      for (const g of defaults) await sbUpsert('cal_games', gameToRow(g));
      games = defaults;
    }
    setBadge('ok');
    render();
  } catch(e) {
    console.error('sync error', e);
    setBadge('err');
    showToast('⚠ Supabase 동기화 실패: ' + e.message, 4000);
  }
}

// 30초마다 자동 폴링 (다른 사람이 수정하면 반영됨)
setInterval(syncAll, 30000);

// ══════════════════════════════════════
// GAMES
// ══════════════════════════════════════
async function addGame() {
  const inp=document.getElementById('newGameInput');
  const name=inp.value.trim(); if(!name) return;
  if(games.find(g=>g.name===name)){showToast('이미 있는 게임입니다');return;}
  const g={id:'g'+Date.now(), name, color:PALETTE[games.length%PALETTE.length]};
  try {
    await sbUpsert('cal_games', gameToRow(g));
    games.push(g); inp.value='';
    renderGames(); populateGameSelect();
    showToast('게임이 추가되었습니다');
  } catch(e) { showToast('저장 실패: '+e.message, 3000); }
}
async function deleteGame(id) {
  if(events.some(e=>e.gameId===id)){showToast('이 게임의 일정을 먼저 삭제해주세요');return;}
  try {
    await sbDelete('cal_games', id);
    games=games.filter(g=>g.id!==id);
    if(filterGame===id) filterGame='all';
    renderGames(); populateGameSelect(); renderMain();
    showToast('게임이 삭제되었습니다');
  } catch(e) { showToast('삭제 실패: '+e.message, 3000); }
}
function renderGames() {
  const list=document.getElementById('gameList'); list.innerHTML='';
  const all=document.createElement('div');
  all.className='game-item g-all'+(filterGame==='all'?' active':'');
  all.innerHTML=`<div class="game-dot" style="background:var(--accent)"></div><span>전체</span><span class="game-count">${events.length}</span>`;
  all.onclick=()=>{ filterGame='all'; renderGames(); renderMain(); };
  list.appendChild(all);
  games.forEach(g=>{
    const cnt=events.filter(e=>e.gameId===g.id).length;
    const item=document.createElement('div');
    item.className='game-item'+(filterGame===g.id?' active':'');
    item.innerHTML=`<div class="game-dot" style="background:${g.color}"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.name}</span><span class="game-count">${cnt}</span><button class="game-del" onclick="event.stopPropagation();deleteGame('${g.id}')">×</button>`;
    item.onclick=()=>{ filterGame=g.id; renderGames(); renderMain(); };
    list.appendChild(item);
  });
}
function populateGameSelect() {
  const sel=document.getElementById('evGame'), prev=sel.value;
  sel.innerHTML='<option value="">게임 선택 없음</option>';
  games.forEach(g=>{ const o=document.createElement('option'); o.value=g.id; o.textContent=g.name; sel.appendChild(o); });
  if(prev) sel.value=prev;
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() { updateLabel(); renderMiniCal(); renderGames(); renderUpcoming(); renderMain(); }
function renderMain() { if(view==='month') renderMonth(); else renderWeek(); }

function updateLabel() {
  if(view==='month') { document.getElementById('curLabel').textContent=`${curYear}년 ${MONTHS[curMonth]}`; }
  else {
    const end=new Date(curWeek); end.setDate(end.getDate()+6);
    document.getElementById('curLabel').textContent=`${curYear}년 ${curWeek.getMonth()+1}/${curWeek.getDate()} – ${end.getMonth()+1}/${end.getDate()}`;
  }
}

// mini cal
function renderMiniCal() {
  document.getElementById('miniTitle').textContent=`${miniY}년 ${MONTHS[miniM]}`;
  const grid=document.getElementById('miniGrid'); grid.innerHTML='';
  DAYS.forEach(d=>{ const el=document.createElement('div'); el.className='mini-dow'; el.textContent=d; grid.appendChild(el); });
  const first=new Date(miniY,miniM,1), last=new Date(miniY,miniM+1,0);
  for(let i=0;i<first.getDay();i++){
    const dt=new Date(miniY,miniM,i-first.getDay()+1);
    const el=document.createElement('div'); el.className='mini-day other'; el.textContent=dt.getDate(); grid.appendChild(el);
  }
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(miniY,miniM,d), ds=fmtDate(dt);
    const el=document.createElement('div'); el.className='mini-day';
    if(fmtDate(today)===ds) el.classList.add('today');
    if(events.some(e=>evOnDate(e,ds))) el.classList.add('has-ev');
    el.textContent=d;
    el.onclick=()=>{ curYear=miniY; curMonth=miniM; curWeek=weekStart(dt); render(); };
    grid.appendChild(el);
  }
  document.getElementById('miniPrev').onclick=()=>{ miniM--; if(miniM<0){miniM=11;miniY--;} renderMiniCal(); };
  document.getElementById('miniNext').onclick=()=>{ miniM++; if(miniM>11){miniM=0;miniY++;} renderMiniCal(); };
}

// upcoming
function renderUpcoming() {
  const list=document.getElementById('upcomingList'); list.innerHTML='';
  const ts=fmtDate(today);
  const ups=visEvs()
    .filter(e=>(e.dateEnd||e.dateStart)>=ts)
    .sort((a,b)=>a.dateStart.localeCompare(b.dateStart))
    .slice(0,6);
  if(!ups.length){ list.innerHTML='<div style="font-size:10px;color:var(--text-muted)">예정된 업데이트 없음</div>'; return; }
  ups.forEach(ev=>{
    const g=getGame(ev.gameId), color=evColor(ev);
    const[,sm,sd]=ev.dateStart.split('-');
    const isRange=ev.dateEnd&&ev.dateEnd!==ev.dateStart;
    const[,em,ed]=isRange?ev.dateEnd.split('-'):[null,null,null];
    const el=document.createElement('div'); el.className='upc-item'; el.style.borderColor=color;
    el.innerHTML=`<div class="upc-date">${sm}/${sd}${isRange?` ~ ${em}/${ed}`:''}${ev.time?' '+fmtTime(ev.time):''}</div>
      <div class="upc-title">${ev.title}${ev.version?` <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace">${ev.version}</span>`:''}</div>
      ${g?`<div class="upc-game" style="color:${color}">${g.name} · <span class="type-badge type-${ev.type||'major'}">${TYPE_LABEL[ev.type||'major']}</span></div>`:''}`;
    el.onclick=()=>showPopup(ev,null);
    list.appendChild(el);
  });
}

// ── Month view ─────────────────────────
function renderMonth() {
  const grid=document.getElementById('monthGrid'); grid.innerHTML='';
  const first=new Date(curYear,curMonth,1), last=new Date(curYear,curMonth+1,0);
  const startDay=first.getDay();
  const total=Math.ceil((startDay+last.getDate())/7)*7;
  const evs=visEvs();

  // Build cell list
  const cells=[];
  for(let i=0;i<total;i++){
    const dt=new Date(curYear,curMonth,i-startDay+1);
    cells.push({ dt, ds:fmtDate(dt), col:i%7 });
  }

  // Per-cell event list (only events that fall on that day)
  const slotMap=cells.map(({ds})=>
    evs.filter(ev=>evOnDate(ev,ds)).sort((a,b)=>a.dateStart.localeCompare(b.dateStart))
  );

  // Assign a fixed "row slot" per event so bars stay in the same row across days
  // We process events in dateStart order
  const evSlot={};
  const sorted=[...evs].sort((a,b)=>a.dateStart.localeCompare(b.dateStart));
  sorted.forEach(ev=>{
    const startIdx=cells.findIndex(c=>c.ds===ev.dateStart);
    const endIdx  =cells.findLastIndex(c=>c.ds<=ev.dateEnd);
    const s=Math.max(startIdx,0), e=Math.min(endIdx>=0?endIdx:s, cells.length-1);
    // collect slots used by overlapping events in the same span
    const used=new Set();
    for(let ci=s;ci<=e;ci++){
      slotMap[ci].forEach(oe=>{
        if(oe.id!==ev.id && evSlot[oe.id]!=null) used.add(evSlot[oe.id]);
      });
    }
    let slot=0; while(used.has(slot)) slot++;
    evSlot[ev.id]=slot;
  });

  // DOM: create cells, then inject bars via absolute positioning per row-of-week
  const cellEls=[];
  cells.forEach(({dt,ds,col},idx)=>{
    const cell=document.createElement('div'); cell.className='day-cell';
    if(dt.getMonth()!==curMonth) cell.classList.add('other-month');
    if(fmtDate(today)===ds) cell.classList.add('today');
    if(col===0) cell.classList.add('sunday');
    // day number
    const num=document.createElement('div'); num.className='day-num'; num.textContent=dt.getDate();
    cell.appendChild(num);
    cell.onclick=()=>openAdd(ds);
    grid.appendChild(cell);
    cellEls.push(cell);
  });

  // Now render events into cells
  // For each event, determine which cells it touches and render a bar element in each
  evs.forEach(ev=>{
    const color=evColor(ev);
    const isMulti=ev.dateEnd&&ev.dateEnd!==ev.dateStart;
    const slot=evSlot[ev.id]||0;
    const BAR_H=18, BAR_TOP=24; // px offset below day number

    cells.forEach(({ds,col},idx)=>{
      if(!evOnDate(ev,ds)) return;
      const isStart=ds===ev.dateStart;
      const isEnd  =ds===(ev.dateEnd||ev.dateStart);
      const cell=cellEls[idx];

      if(isMulti){
        // Span bar — one div per cell, styled to look continuous
        const bar=document.createElement('div');
        bar.style.cssText=[
          'position:absolute',
          `top:${BAR_TOP + slot*(BAR_H+2)}px`,
          'left:0','right:0',
          `height:${BAR_H}px`,
          `background:${color}28`,
          `color:${color}`,
          'display:flex','align-items:center',
          'font-size:10px','cursor:pointer','z-index:2',
          'overflow:hidden','white-space:nowrap',
          isStart ? `border-left:3px solid ${color}` : 'border-left:none',
          isEnd   ? `border-radius:0 3px 3px 0` : '',
          isStart ? `border-radius:3px ${isEnd?'3px 3px':'0 0'} 3px` : '',
        ].join(';');
        // show label only on start or at the beginning of a new week row (col===0)
        if(isStart||col===0){
          bar.innerHTML=`<span style="padding:0 5px;overflow:hidden;text-overflow:ellipsis;">${ev.title}${ev.version?' '+ev.version:''}</span>`;
        }
        bar.onclick=e=>{ e.stopPropagation(); showPopup(ev,e); };
        cell.style.position='relative';
        cell.appendChild(bar);
      } else {
        // Single-day event — only on its one cell
        if(!isStart) return;
        const row=document.createElement('div'); row.className='ev-row';
        row.innerHTML=`<div class="ev-game-dot" style="background:${color}"></div><span class="ev-name" style="color:${color}">${ev.title}</span><span class="type-badge type-${ev.type||'major'}">${TYPE_LABEL[ev.type||'major']}</span>`;
        row.onclick=e=>{ e.stopPropagation(); showPopup(ev,e); };
        cell.appendChild(row);
      }
    });
  });
}

// ── Week view ──────────────────────────
function renderWeek() {
  const hdr=document.getElementById('weekHdr'), body=document.getElementById('weekBody');
  hdr.innerHTML='<div class="wh-empty" style="height:40px"></div>'; body.innerHTML='';
  const days=[];
  for(let i=0;i<7;i++){
    const dt=new Date(curWeek); dt.setDate(dt.getDate()+i); days.push(dt);
    const hd=document.createElement('div'); hd.className='wh-day';
    if(fmtDate(dt)===fmtDate(today)) hd.classList.add('today');
    if(dt.getDay()===0) hd.classList.add('sunday');
    hd.innerHTML=`<div class="wh-name">${DAYS[dt.getDay()]}</div><div class="wh-num">${dt.getDate()}</div>`;
    hdr.appendChild(hd);
  }
  const gutter=document.createElement('div'); gutter.className='time-gutter';
  for(let h=0;h<24;h++){ const l=document.createElement('div'); l.className='time-lbl'; l.textContent=h?`${p2(h)}:00`:''; gutter.appendChild(l); }
  body.appendChild(gutter);
  const evs=visEvs();
  days.forEach(dt=>{
    const ds=fmtDate(dt), col=document.createElement('div'); col.className='week-col';
    for(let h=0;h<24;h++){ const s=document.createElement('div'); s.className='hour-slot'; s.onclick=()=>openAdd(ds,`${p2(h)}:00`); col.appendChild(s); }
    // timed events
    evs.filter(e=>evOnDate(e,ds)&&e.time).forEach(ev=>{
      const[sh,sm]=ev.time.split(':').map(Number);
      const isMulti=ev.dateEnd&&ev.dateEnd!==ev.dateStart;
      const daysLeft=isMulti?daysBetween(ds,ev.dateEnd)+1:1;
      const top=(sh*60+sm)/60*44, height=Math.max(daysLeft===1?44:44*Math.min(daysLeft,1),28);
      const color=evColor(ev);
      const el=document.createElement('div'); el.className='week-ev';
      el.style.top=top+'px'; el.style.height=height+'px';
      el.style.background=color+'28'; el.style.borderColor=color; el.style.color=color;
      el.innerHTML=`<strong>${ev.title}</strong>${ev.dateEnd&&ev.dateEnd!==ev.dateStart?`<br><span style="font-size:9px;opacity:.7">${ev.dateStart} ~ ${ev.dateEnd}</span>`:`<br><span class="type-badge type-${ev.type||'major'}">${TYPE_LABEL[ev.type||'major']}</span>`}`;
      el.onclick=e=>{ e.stopPropagation(); showPopup(ev,e); };
      col.appendChild(el);
    });
    // all-day / no-time multi-day events shown at top
    evs.filter(e=>evOnDate(e,ds)&&!e.time).forEach((ev,idx)=>{
      const color=evColor(ev);
      const el=document.createElement('div');
      el.style.cssText=`position:absolute;left:2px;right:2px;top:${idx*18}px;height:16px;border-radius:3px;padding:1px 5px;font-size:9px;background:${color}30;border-left:2px solid ${color};color:${color};overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;z-index:1`;
      el.textContent=ev.title;
      el.onclick=e=>{ e.stopPropagation(); showPopup(ev,e); };
      col.appendChild(el);
    });
    if(fmtDate(dt)===fmtDate(today)){
      const now=new Date(), top=(now.getHours()*60+now.getMinutes())/60*44;
      const line=document.createElement('div'); line.className='now-line'; line.style.top=top+'px'; col.appendChild(line);
    }
    body.appendChild(col);
  });
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
document.getElementById('prevBtn').onclick=()=>{
  if(view==='month'){curMonth--;if(curMonth<0){curMonth=11;curYear--;}}
  else{curWeek=new Date(curWeek.getTime()-7*86400000);curYear=curWeek.getFullYear();curMonth=curWeek.getMonth();}
  miniY=curYear;miniM=curMonth;render();
};
document.getElementById('nextBtn').onclick=()=>{
  if(view==='month'){curMonth++;if(curMonth>11){curMonth=0;curYear++;}}
  else{curWeek=new Date(curWeek.getTime()+7*86400000);curYear=curWeek.getFullYear();curMonth=curWeek.getMonth();}
  miniY=curYear;miniM=curMonth;render();
};
document.getElementById('todayBtn').onclick=()=>{
  curYear=today.getFullYear();curMonth=today.getMonth();curWeek=weekStart(today);
  miniY=curYear;miniM=curMonth;render();
};
function setView(v){
  view=v;
  document.getElementById('monthView').style.display=v==='month'?'flex':'none';
  document.getElementById('weekView').style.display=v==='week'?'flex':'none';
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  render();
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function onDateStartChange(){
  const s=document.getElementById('evDateStart').value;
  const e=document.getElementById('evDateEnd');
  if(!e.value || e.value < s) e.value=s;
  e.min=s;
}
function openAdd(dateStr, timeStr) {
  curTags=[]; curType='major';
  document.getElementById('evModalTitle').textContent='업데이트 일정 추가';
  document.getElementById('evId').value='';
  document.getElementById('evTitle').value='';
  document.getElementById('evDateStart').value=dateStr||fmtDate(today);
  document.getElementById('evDateEnd').value=dateStr||fmtDate(today);
  document.getElementById('evDateEnd').min=dateStr||fmtDate(today);
  document.getElementById('evTime').value=timeStr||'';
  document.getElementById('evVersion').value='';
  document.getElementById('evDesc').value='';
  document.getElementById('delBtn').style.display='none';
  populateGameSelect();
  if(filterGame!=='all') document.getElementById('evGame').value=filterGame;
  selType('major'); renderTagsWrap();
  document.getElementById('evOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(),100);
}
function openEdit(id) {
  const ev=events.find(e=>e.id===id); if(!ev)return;
  curTags=[...(ev.tags||[])]; curType=ev.type||'major';
  document.getElementById('evModalTitle').textContent='업데이트 일정 수정';
  document.getElementById('evId').value=id;
  document.getElementById('evTitle').value=ev.title;
  document.getElementById('evDateStart').value=ev.dateStart||'';
  document.getElementById('evDateEnd').value=ev.dateEnd||ev.dateStart||'';
  document.getElementById('evDateEnd').min=ev.dateStart||'';
  document.getElementById('evTime').value=ev.time||'';
  document.getElementById('evVersion').value=ev.version||'';
  document.getElementById('evDesc').value=ev.desc||'';
  document.getElementById('delBtn').style.display='inline-block';
  populateGameSelect();
  document.getElementById('evGame').value=ev.gameId||'';
  selType(ev.type||'major'); renderTagsWrap();
  closePopup();
  document.getElementById('evOverlay').classList.add('open');
}
function closeEvModal(){ document.getElementById('evOverlay').classList.remove('open'); }
function closeEvOverlay(e){ if(e.target===document.getElementById('evOverlay')) closeEvModal(); }

function selType(t) {
  curType=t;
  document.querySelectorAll('.type-opt').forEach(el=>el.classList.toggle('selected',el.dataset.type===t));
}
function addTag(){
  const inp=document.getElementById('tagInput'), val=inp.value.trim();
  if(!val||curTags.includes(val)){inp.value='';return;}
  curTags.push(val); inp.value=''; renderTagsWrap();
}
function removeTag(t){ curTags=curTags.filter(x=>x!==t); renderTagsWrap(); }
function renderTagsWrap(){
  const w=document.getElementById('tagsWrap'); w.innerHTML='';
  curTags.forEach(t=>{
    const p=document.createElement('div'); p.className='tag-pill';
    p.innerHTML=`${t}<button onclick="removeTag('${t.replace(/'/g,"\\'")}')">×</button>`;
    w.appendChild(p);
  });
}
async function saveEvent(){
  const title=document.getElementById('evTitle').value.trim();
  if(!title){document.getElementById('evTitle').focus();return;}
  const id=document.getElementById('evId').value;
  const dateStart=document.getElementById('evDateStart').value;
  let dateEnd=document.getElementById('evDateEnd').value||dateStart;
  if(dateEnd<dateStart) dateEnd=dateStart;
  const ev={
    id: id||Date.now().toString(),
    title, dateStart, dateEnd,
    time:    document.getElementById('evTime').value||null,
    version: document.getElementById('evVersion').value.trim()||null,
    gameId:  document.getElementById('evGame').value||null,
    type:    curType, tags:[...curTags],
    desc:    document.getElementById('evDesc').value.trim(),
  };
  try {
    await sbUpsert('cal_events', evToRow(ev));
    if(id){ const idx=events.findIndex(e=>e.id===id); if(idx>=0)events[idx]=ev; }
    else events.push(ev);
    closeEvModal(); render();
    showToast(id?'일정이 수정되었습니다':'일정이 추가되었습니다');
  } catch(e) { showToast('저장 실패: '+e.message, 3000); }
}
async function deleteEvent(){
  const id=document.getElementById('evId').value; if(!id)return;
  try {
    await sbDelete('cal_events', id);
    events=events.filter(e=>e.id!==id);
    closeEvModal(); render(); showToast('일정이 삭제되었습니다');
  } catch(e) { showToast('삭제 실패: '+e.message, 3000); }
}

// ══════════════════════════════════════
// POPUP
// ══════════════════════════════════════
function showPopup(ev, e) {
  popupId=ev.id;
  const g=getGame(ev.gameId), color=evColor(ev);
  document.getElementById('ppBar').style.background=color;
  document.getElementById('ppTitle').textContent=ev.title+(ev.version?` ${ev.version}`:'');
  const meta=document.getElementById('ppMeta');
  const isRange=ev.dateEnd&&ev.dateEnd!==ev.dateStart;
  const dateStr=isRange?`${ev.dateStart} ~ ${ev.dateEnd}`:ev.dateStart;
  const dayCount=isRange?daysBetween(ev.dateStart,ev.dateEnd)+1:1;
  meta.innerHTML=`<span class="pp-date">${dateStr}${isRange?` (${dayCount}일)`:''} ${ev.time?fmtTime(ev.time):''}</span>
    <span class="type-badge type-${ev.type||'major'}">${TYPE_LABEL[ev.type||'major']}</span>
    ${g?`<span style="font-size:10px;color:${color}">${g.name}</span>`:''}`;
  document.getElementById('ppTags').innerHTML=(ev.tags||[]).map(t=>`<span class="pp-tag">${t}</span>`).join('');
  document.getElementById('ppDesc').textContent=ev.desc||'';
  const popup=document.getElementById('evPopup');
  popup.style.display='block'; popup.style.transform='';
  if(e){
    let x=e.clientX+10, y=e.clientY+10;
    if(x+265>window.innerWidth) x=e.clientX-265;
    if(y+210>window.innerHeight) y=e.clientY-210;
    popup.style.left=x+'px'; popup.style.top=y+'px';
  } else {
    popup.style.left='50%'; popup.style.top='50%'; popup.style.transform='translate(-50%,-50%)';
  }
}
function closePopup(){ document.getElementById('evPopup').style.display='none'; popupId=null; }
function editFromPopup(){ if(popupId) openEdit(popupId); }

document.addEventListener('click', e=>{
  const p=document.getElementById('evPopup');
  if(p.style.display==='block'&&!p.contains(e.target)) closePopup();
});

// ══════════════════════════════════════
miniY=curYear; miniM=curMonth;
setBadge('loading');
(async () => {
  const loggedIn = await initAuth();
  if (loggedIn) syncAll();
})();
</script>
